model:
  provider: local
  name: BAAI/bge-small-zh-v1.5
  dim: 384
  device: cpu
  batch_size: 32
  base_url: https://api.siliconflow.cn/v1
  embeddings_url:
  api_key_env: SILICONFLOW_API_KEY
  timeout_seconds: 30
  dimensions:
  normalize: true
graph:
  sim_threshold: 0.5
  parent_child_bonus: 0.2
  sibling_bonus: 0.1
  consecutive_bonus: 0.15
search:
  top_k: 5
  source_k: 3
  steps: 3
  decay: 0.7
  amplitude_cutoff: 0.01
  aggregate: max
  propagation_boost: 1.0
  metadata_field_boost: 0.05
  tag_boost: 0.03
  lexical_enabled: true
  lexical_candidate_k: 32
  lexical_source_k: 3
  lexical_min_token_chars: 2
  lexical_boost: 0.2
  lexical_exact_code_boost: 0.15
  lexical_model_boost: 0.12
  ann_preselect_enabled: false
  ann_candidate_k: 64
  ann_force_exact_on_filters: false
  debug_metadata_enabled: false
parser:
  max_chars: 500
  min_chars: 50
  pdf_profile: product_manual
  pdf_heading_hints: []
storage:
  data_dir: data
  schema_version: "1"
vector_store:
  provider: npz
  qdrant_url: http://localhost:6333
  collection_prefix: tagmemorag
  timeout_seconds: 10
server:
  host: 0.0.0.0
  port: 8000
  shutdown_timeout_seconds: 60
logging:
  level: INFO
  format: json
auth:
  enabled: false
  backend: config
  public_paths:
    - /health
    - /ready
    - /metrics
    - /docs
    - /redoc
    - /openapi.json
  global_max_rate_limit_per_minute: 1000
  keys: []
rate_limit:
  enabled: true
  default_per_minute: 60
  window_seconds: 60
cache:
  enabled: true
  max_entries: 10000
  ttl_seconds: 3600
manual_library:
  root_dir: product_manuals
  allow_overwrite: false
  incremental_auto_max_dirty_manuals: 20
  incremental_auto_max_dirty_chunks: 500
  registry_backend: file
  registry_path: data/manual_registry.sqlite3
  blob_backend: local
  blob_root_dir: data/manual_blobs
  s3_bucket: ""
  s3_prefix: ""
  s3_endpoint_url: ""
  s3_region: ""
  s3_access_key_env: AWS_ACCESS_KEY_ID
  s3_secret_key_env: AWS_SECRET_ACCESS_KEY
  s3_session_token_env: ""
  s3_addressing_style: auto
  s3_timeout_seconds: 10.0
wave_phase0:
  enabled: true
  epa_basis_enabled: true
  epa_min_k: 8
  epa_cluster_count: 32
  epa_energy_threshold: 0.95
  epa_retrain_growth_ratio: 0.20
  epa_lock_timeout_seconds: 30.0
wave_phase1:
  enabled: true
  spike_enabled: false
  cooccurrence_enabled: true
  phi_max: 0.9
  phi_min: 0.5
  legacy_phi: 0.7
  max_tags_per_manual: 100
  spike_max_hops: 4
  spike_base_momentum: 2.0
  spike_firing_threshold: 0.10
  spike_base_decay: 0.25
  spike_wormhole_decay: 0.70
  spike_tension_threshold: 1.0
  spike_max_emergent_nodes: 50
  spike_max_neighbors_per_node: 20
  seed_top_k: 8
  seed_min_similarity: 0.3
  dynamic_boost_factor_strategy: constant
  dynamic_boost_min: 0.3
  dynamic_boost_max: 2.0
  epa_logic_depth_scale: 2.0
  epa_floor: 0.0
  pyramid_max_levels: 3
  pyramid_top_k: 10
  pyramid_min_energy_ratio: 0.1
  pyramid_layer_decay_base: 0.7
  pyramid_use_handshake_features: true
  activation_multiplier_min: 0.5
  activation_multiplier_max: 1.5
  pyramid_post_scale: 4.0
  lang_penalty_enabled: false
  lang_penalty_unknown: 0.4
  lang_penalty_cross_domain: 0.3
  core_boost_min: 1.20
  core_boost_max: 1.40
  cross_domain_resonance_enabled: false
  dedup_threshold: 0.88
  dedup_weight_transfer: 0.2
  legacy_chunk_tag_boost: false
observability:
  metrics:
    enabled: true
    path: /metrics
    include_runtime: true
  tracing:
    enabled: false
    service_name: tagmemorag
    otlp_endpoint:
    sample_ratio: 1.0
    export_timeout_seconds: 5
