<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TagMemoRAG Q&A</title>
    <link rel="stylesheet" href="{{ url_for('manual-library-static', path='manual_library.css') }}">
  </head>
  <body>
    <script id="qa-page-config" type="application/json">
      {{ {"defaultKbName": default_kb_name, "apiBasePath": api_base_path, "authEnabled": auth_enabled} | tojson }}
    </script>

    <div class="app-shell qa-shell">
      <header class="qa-header">
        <div class="brand">
          <span class="eyebrow">TagMemoRAG</span>
          <h1>Product Manual Q&A</h1>
        </div>
        <form class="kb-form qa-kb-form" id="qa-kb-form">
          <label>
            <span>Knowledge base</span>
            <input id="qa-kb-name" name="kb_name" value="{{ default_kb_name }}" autocomplete="off">
          </label>
          <button type="submit">Use</button>
        </form>
      </header>

      <main class="qa-main">
        <section class="qa-panel" aria-label="Ask a product manual question">
          <form id="qa-question-form" class="qa-question-form">
            <label>
              <span>Question</span>
              <textarea id="qa-question" rows="4" placeholder="Ask a product-manual question"></textarea>
            </label>
            <div class="qa-actions">
              {% if auth_enabled %}
              <label class="token-field qa-token-field">
                <span>API token</span>
                <input id="qa-api-token" type="password" autocomplete="off" placeholder="Bearer token">
              </label>
              {% endif %}
              <button id="qa-submit" class="primary" type="submit">Ask</button>
            </div>
          </form>
        </section>

        <section class="status-strip qa-status" id="qa-status" role="status" aria-live="polite"></section>

        <section class="qa-answer-panel" aria-label="Answer">
          <div class="pane-header compact">
            <div>
              <h2>Answer</h2>
              <p id="qa-answer-meta">No answer yet</p>
            </div>
          </div>
          <div id="qa-answer" class="answer-body empty-state">Ask a question to generate an answer.</div>
        </section>

        <section class="qa-sources-panel" aria-label="Sources">
          <div class="pane-header compact">
            <div>
              <h2>Sources</h2>
              <p id="qa-source-meta">Cited source snippets will appear here.</p>
            </div>
          </div>
          <div id="qa-sources" class="qa-source-list empty-state">No sources yet.</div>
        </section>
      </main>
    </div>

    <script type="module" src="{{ url_for('manual-library-static', path='qa_page.js') }}"></script>
  </body>
</html>
