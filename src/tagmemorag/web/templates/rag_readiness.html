<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TagMemoRAG RAG Readiness</title>
    <link rel="stylesheet" href="{{ url_for('manual-library-static', path='manual_library.css') }}">
  </head>
  <body>
    <script id="rag-readiness-config" type="application/json">
      {{ {"defaultKbName": default_kb_name, "apiBasePath": api_base_path, "authEnabled": auth_enabled} | tojson }}
    </script>

    <div class="app-shell readiness-shell">
      <header class="topbar readiness-topbar">
        <div class="brand">
          <span class="eyebrow">TagMemoRAG</span>
          <h1>RAG Readiness</h1>
        </div>
        <form class="kb-form" id="readiness-kb-form">
          <label>
            <span>KB</span>
            <input id="readiness-kb-name" name="kb_name" value="{{ default_kb_name }}" autocomplete="off">
          </label>
          <button type="submit">Load</button>
        </form>
        <label class="token-field">
          <span>API token</span>
          <input id="readiness-api-token" type="password" autocomplete="off" placeholder="Bearer token">
        </label>
        <nav class="top-actions readiness-links" aria-label="Readiness navigation">
          <a id="readiness-workbench" class="button-link" href="/admin/rag-workbench?kb_name={{ default_kb_name }}">RAG Workbench</a>
          <a id="readiness-manual-library" class="button-link" href="/admin/manual-library?kb_name={{ default_kb_name }}">Manual Library</a>
          <a id="readiness-retrieval-quality" class="button-link" href="/admin/retrieval-quality?kb_name={{ default_kb_name }}">Retrieval Quality</a>
          <a id="readiness-eval-report" class="button-link" href="/admin/eval-report?kb_name={{ default_kb_name }}">Eval Report</a>
          <a id="readiness-qa" class="button-link" href="/qa?kb_name={{ default_kb_name }}">Ask Q&A</a>
        </nav>
      </header>

      <main>
        <section class="status-strip" id="readiness-status" role="status" aria-live="polite"></section>

        <section class="readiness-hero" aria-label="RAG readiness summary">
          <div>
            <span id="readiness-state" class="status-pill neutral">Loading</span>
            <h2 id="readiness-title">Checking RAG readiness</h2>
            <p id="readiness-summary">Loading readiness signals for this KB.</p>
          </div>
          <div id="readiness-actions" class="readiness-actions"></div>
        </section>

        <section class="readiness-card-grid" id="readiness-cards" aria-label="Readiness checks">
          <div class="empty-state">Loading readiness checks...</div>
        </section>

        <section class="table-pane readiness-recommendations-pane" aria-label="Recommended next actions">
          <div class="pane-header">
            <div>
              <h2>Recommended Actions</h2>
              <p id="readiness-recommendation-count">No recommendations loaded.</p>
            </div>
            <button id="readiness-refresh" type="button" class="button-link">Refresh</button>
          </div>
          <div id="readiness-recommendations" class="readiness-recommendations empty-state">Loading recommendations...</div>
        </section>
      </main>
    </div>

    <script type="module" src="{{ url_for('manual-library-static', path='rag_readiness.js') }}"></script>
  </body>
</html>
